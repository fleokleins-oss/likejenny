global:
  scrape_interval: 10s

scrape_configs:
  - job_name: apex_brain
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: apex_shadowglass
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8001"]

  - job_name: apex_executioner
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8002"]

  - job_name: apex_antirug
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8003"]

  - job_name: apex_maestro
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8004"]
